name: Verify Java Assignment

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Download JUnit 5 Console Launcher
      run: |
        set -euo pipefail
        mkdir -p junit
        JUNIT_VERSION=5.10.2
        JUNIT_JAR="junit/junit-platform-console-standalone.jar"
        PRIMARY_URL="https://repo1.maven.org/maven2/org/junit/platform/junit-platform-console-standalone/$JUNIT_VERSION/junit-platform-console-standalone-$JUNIT_VERSION.jar"
        FALLBACK_URL="https://repo.maven.apache.org/maven2/org/junit/platform/junit-platform-console-standalone/$JUNIT_VERSION/junit-platform-console-standalone-$JUNIT_VERSION.jar"

        echo "Downloading JUnit from primary URL..."
        if ! curl -fL --retry 5 --retry-delay 2 --retry-all-errors -o "$JUNIT_JAR" "$PRIMARY_URL"; then
          echo "Primary download failed. Trying fallback URL..."
          curl -fL --retry 5 --retry-delay 2 --retry-all-errors -o "$JUNIT_JAR" "$FALLBACK_URL"
        fi

        echo "Validating downloaded JAR..."
        jar tf "$JUNIT_JAR" > /dev/null
        echo "JUnit JAR downloaded and validated successfully."

    - name: Compile ALL Java sources under com/uws
      run: |
        echo "Compiling all Java files under com/uws..."
        mkdir -p out
        find com/uws -type f -name "*.java" | sort > all_sources.txt
        echo "Found $(wc -l < all_sources.txt) Java source file(s)."
        
        if [ -s all_sources.txt ]; then
          javac -cp junit/junit-platform-console-standalone.jar \
                -d out @all_sources.txt
        else
          echo "No Java source files found under com/uws"
          exit 1
        fi

    - name: Run ALL JUnit 5 Tests under com/uws
      run: |
        echo "Running JUnit 5 tests (scanning classpath)..."
        java -jar junit/junit-platform-console-standalone.jar \
          --class-path out \
          --scan-class-path \
          --include-package com.uws

    - name: Check README.md updated
      id: readme_check
      run: |
        if git diff --quiet HEAD^ HEAD -- README.md; then
          echo "updated=false" >> $GITHUB_OUTPUT
        else
          echo "updated=true" >> $GITHUB_OUTPUT
        fi

    - name: Show README update result
      run: echo "README updated? ${{ steps.readme_check.outputs.updated }}"